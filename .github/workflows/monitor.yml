name: Vic Building Monitor

on:
# 🔴 NEW: This allows the iPhone/Orchestrator to trigger this repo
  repository_dispatch:
    types: [trigger-all-repos]
    
  # Standard daily schedule (e.g., 7:30 AM Sydney/Brisbane time)
  schedule:
    - cron: '30 21 * * *' 
    
  # Manual trigger button for your iPhone Shortcut
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4
      - run: python monitor.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
