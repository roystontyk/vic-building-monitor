name: Vic Building Monitor

on:
  # Allows your iPhone/Orchestrator to trigger this via API
  repository_dispatch:
    types: [trigger-all-repos]
    
  # Runs at 8:30 AM Melbourne Time (AEDT)
  schedule:
    - cron: '30 21 * * *' 
    
  # Manual "Play" button in GitHub Actions tab
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 htmldate certifi
          
      - name: Run Script
        run: python monitor.py
        env:
          # Ensure these match the Secret names in your GitHub Settings
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Optional: Helps some python libs recognize the local timezone
          TZ: 'Australia/Melbourne'
